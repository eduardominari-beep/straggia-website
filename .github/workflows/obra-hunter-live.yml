name: obra-hunter-live

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * 1"

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run OBRA HUNTER AI MVP
        run: python run.py --cities all --min-score 35 --max-leads 10

      - name: Upload runs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: obra-hunter-runs
          path: data/runs/**
